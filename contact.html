<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Sami Almuhur - Software Engineer and Mobile Application Developer">
    <title>Contact Me - Sami Almuhur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dark Mode Colors */
            --bg-primary-dark: #0a0a0a;
            --bg-secondary-dark: #1a1a1a;
            --bg-card-dark: rgba(26, 26, 26, 0.8);
            --text-primary-dark: #ffffff;
            --text-secondary-dark: #b8b8b8;
            --text-muted-dark: #707070;
            --gold-accent: #d4af37;
            --gold-accent-hover: #f5d76e;
            --gold-glow: rgba(212, 175, 55, 0.3);
            
            /* Light Mode Colors */
            --bg-primary-light: #ffffff;
            --bg-secondary-light: #f8f8f8;
            --bg-card-light: rgba(255, 255, 255, 0.9);
            --text-primary-light: #1a1a1a;
            --text-secondary-light: #4a4a4a;
            --text-muted-light: #8a8a8a;
            
            /* Current Theme Variables */
            --bg-primary: var(--bg-primary-dark);
            --bg-secondary: var(--bg-secondary-dark);
            --bg-card: var(--bg-card-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
            --text-muted: var(--text-muted-dark);
        }

        [data-theme="light"] {
            --bg-primary: var(--bg-primary-light);
            --bg-secondary: var(--bg-secondary-light);
            --bg-card: var(--bg-card-light);
            --text-primary: var(--text-primary-light);
            --text-secondary: var(--text-secondary-light);
            --text-muted: var(--text-muted-light);
        }

        [dir="rtl"] {
            font-family: 'Cairo', 'Inter', sans-serif;
        }

        [dir="ltr"] {
            font-family: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Glassmorphism Effect */
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        /* Gold Accent Button */
        .btn-gold {
            background: linear-gradient(135deg, #d4af37 0%, #f5d76e 100%);
            color: var(--bg-primary-dark);
            padding: 0.875rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            z-index: 1;
        }

        .btn-gold::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            pointer-events: none;
            z-index: -1;
        }

        .btn-gold:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--gold-glow);
        }

        .btn-gold span {
            position: relative;
            z-index: 1;
        }

        /* Animations */
        .fade-in {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                        transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .stagger-1 { transition-delay: 0.1s; }
        .stagger-2 { transition-delay: 0.2s; }

        /* Smooth text transition */
        .text-transition {
            transition: all 0.5s ease;
        }

        /* Contact Form */
        .contact-form-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: start;
        }

        @media (max-width: 768px) {
            .contact-form-container {
                grid-template-columns: 1fr;
            }
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 1rem;
            background: var(--bg-card);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-textarea {
            min-height: 150px;
            resize: vertical;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--gold-accent);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .contact-info-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 1.5rem;
            padding: 2rem;
            height: 100%;
        }

        .contact-info-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .contact-info-item:last-child {
            margin-bottom: 0;
        }

        .contact-info-icon {
            width: 48px;
            height: 48px;
            background: rgba(212, 175, 55, 0.2);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .contact-info-content h4 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
        }

        .contact-info-content p,
        .contact-info-content a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .contact-info-content a:hover {
            color: var(--gold-accent);
        }

        /* Gold Gradient Text */
        .gold-text {
            background: linear-gradient(135deg, #d4af37 0%, #f5d76e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Back Button */
        .back-button {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 100;
        }

        [dir="rtl"] .back-button {
            left: auto;
            right: 2rem;
        }

        @media (max-width: 768px) {
            .back-button {
                top: 1rem;
                left: 1rem;
            }
            [dir="rtl"] .back-button {
                left: auto;
                right: 1rem;
            }
        }

        /* Theme Toggle */
        .theme-toggle {
            width: 50px;
            height: 26px;
            background: rgba(212, 175, 55, 0.2);
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .theme-toggle.active {
            background: var(--gold-accent);
        }

        .theme-toggle::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            top: 3px;
            left: 3px;
            transition: transform 0.3s ease;
        }

        .theme-toggle.active::after {
            transform: translateX(24px);
        }

        /* Language Toggle */
        .lang-toggle {
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 0.5rem;
        }

        .lang-btn {
            padding: 0.5rem 1rem;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 0.375rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background: var(--gold-accent);
            color: var(--bg-primary-dark);
        }

        /* Controls */
        .page-controls {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 100;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        [dir="rtl"] .page-controls {
            right: auto;
            left: 2rem;
        }

        @media (max-width: 768px) {
            .page-controls {
                top: 1rem;
                right: 1rem;
            }
            [dir="rtl"] .page-controls {
                right: auto;
                left: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Back Button -->
    <a href="index.html" class="back-button">
        <button class="btn-gold" style="padding: 0.75rem 1.5rem;">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            <span data-key="back">Back</span>
        </button>
    </a>

    <!-- Theme and Language Controls -->
    <div class="page-controls">
        <div class="lang-toggle">
            <button class="lang-btn" data-lang="en" onclick="toggleLanguage('en')">EN</button>
            <button class="lang-btn" data-lang="ar" onclick="toggleLanguage('ar')">AR</button>
        </div>
        <div class="theme-toggle" id="theme-toggle" onclick="toggleTheme()"></div>
    </div>

    <!-- Contact Section -->
    <section class="py-20 px-6" style="background: var(--bg-primary); min-height: 100vh; display: flex; align-items: center;">
        <div class="container mx-auto max-w-6xl">
            <h2 class="text-4xl md:text-5xl font-bold mb-4 text-center gold-text fade-in" data-key="contact.title">Get In Touch</h2>
            <p class="text-xl mb-12 text-center fade-in stagger-1 text-transition" style="color: var(--text-secondary);" data-key="contact.description">
                I'm always open to discussing new opportunities and interesting projects.
            </p>
            
            <div class="contact-form-container">
                <!-- Contact Form -->
                <div class="glass-card rounded-2xl p-8 fade-in stagger-1">
                    <h3 class="text-2xl font-bold mb-6 text-transition" data-key="contact.form.title">Send Message</h3>
                    <form id="contactForm" onsubmit="handleContactForm(event)">
                        <div class="form-group">
                            <label for="contactName" class="form-label" data-key="contact.form.name">Name</label>
                            <input 
                                type="text" 
                                id="contactName" 
                                name="name" 
                                class="form-input" 
                                required
                                data-key="contact.form.name.placeholder"
                                placeholder="Your Name"
                            >
                        </div>
                        
                        <div class="form-group">
                            <label for="contactEmail" class="form-label" data-key="contact.form.email">Email</label>
                            <input 
                                type="email" 
                                id="contactEmail" 
                                name="email" 
                                class="form-input" 
                                required
                                data-key="contact.form.email.placeholder"
                                placeholder="your.email@example.com"
                            >
                        </div>
                        
                        <div class="form-group">
                            <label for="contactDescription" class="form-label" data-key="contact.form.message">Description</label>
                            <textarea 
                                id="contactDescription" 
                                name="description" 
                                class="form-textarea" 
                                required
                                data-key="contact.form.message.placeholder"
                                placeholder="Your message here..."
                            ></textarea>
                        </div>
                        
                        <button type="submit" class="btn-gold w-full" data-key="contact.form.submit">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                            </svg>
                            <span>Send Message</span>
                        </button>
                    </form>
                </div>

                <!-- Contact Information -->
                <div class="contact-info-card fade-in stagger-2">
                    <h3 class="text-2xl font-bold mb-6 text-transition" data-key="contact.info.title">Contact Information</h3>
                    
                    <div class="contact-info-item">
                        <div class="contact-info-icon">
                            <svg class="w-6 h-6" style="color: var(--gold-accent);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                            </svg>
                        </div>
                        <div class="contact-info-content">
                            <h4 data-key="contact.info.email">Email</h4>
                            <a href="mailto:samialmuhurse@gmail.com">samialmuhurse@gmail.com</a>
                        </div>
                    </div>

                    <div class="contact-info-item">
                        <div class="contact-info-icon">
                            <svg class="w-6 h-6" style="color: var(--gold-accent);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            </svg>
                        </div>
                        <div class="contact-info-content">
                            <h4 data-key="contact.info.location">Location</h4>
                            <p data-key="hero.location">Amman, Jordan</p>
                        </div>
                    </div>

                    <div class="contact-info-item">
                        <div class="contact-info-icon">
                            <svg class="w-6 h-6" style="color: var(--gold-accent);" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                            </svg>
                        </div>
                        <div class="contact-info-content">
                            <h4>GitHub</h4>
                            <a href="https://github.com/Someooo" target="_blank">github.com/Someooo</a>
                        </div>
                    </div>

                    <div class="contact-info-item">
                        <div class="contact-info-icon">
                            <svg class="w-6 h-6" style="color: var(--gold-accent);" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                            </svg>
                        </div>
                        <div class="contact-info-content">
                            <h4>LinkedIn</h4>
                            <a href="https://www.linkedin.com/in/sami-almuhur-1755a4356/" target="_blank">LinkedIn Profile</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Translations
        const translations = {
            en: {
                'back': 'Back',
                'contact.title': 'Get In Touch',
                'contact.description': "I'm always open to discussing new opportunities and interesting projects.",
                'contact.form.title': 'Send Message',
                'contact.form.name': 'Name',
                'contact.form.name.placeholder': 'Your Name',
                'contact.form.email': 'Email',
                'contact.form.email.placeholder': 'your.email@example.com',
                'contact.form.message': 'Description',
                'contact.form.message.placeholder': 'Your message here...',
                'contact.form.submit': 'Send Message',
                'contact.info.title': 'Contact Information',
                'contact.info.email': 'Email',
                'contact.info.location': 'Location',
                'hero.location': 'Amman, Jordan'
            },
            ar: {
                'back': 'رجوع',
                'contact.title': 'تواصل معي',
                'contact.description': 'أنا دائمًا منفتح لمناقشة الفرص الجديدة والمشاريع المثيرة للاهتمام.',
                'contact.form.title': 'إرسال رسالة',
                'contact.form.name': 'الاسم',
                'contact.form.name.placeholder': 'اسمك',
                'contact.form.email': 'البريد الإلكتروني',
                'contact.form.email.placeholder': 'بريدك@example.com',
                'contact.form.message': 'الوصف',
                'contact.form.message.placeholder': 'رسالتك هنا...',
                'contact.form.submit': 'إرسال الرسالة',
                'contact.info.title': 'معلومات الاتصال',
                'contact.info.email': 'البريد الإلكتروني',
                'contact.info.location': 'الموقع',
                'hero.location': 'عمان، الأردن'
            }
        };

        // Current language
        let currentLang = localStorage.getItem('language') || 'en';
        let currentTheme = localStorage.getItem('theme') || 'dark';

        // Initialize theme
        function initTheme() {
            document.documentElement.setAttribute('data-theme', currentTheme);
            const toggle = document.getElementById('theme-toggle');
            if (currentTheme === 'light') {
                toggle.classList.add('active');
            } else {
                toggle.classList.remove('active');
            }
        }

        // Initialize language
        function initLanguage() {
            document.documentElement.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
            document.documentElement.setAttribute('lang', currentLang);
            updateTranslations();
            updateLangButtons();
        }

        // Update translations
        function updateTranslations() {
            const elements = document.querySelectorAll('[data-key]');
            elements.forEach(el => {
                const key = el.getAttribute('data-key');
                if (translations[currentLang][key]) {
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                        el.placeholder = translations[currentLang][key];
                    } else {
                        el.textContent = translations[currentLang][key];
                    }
                }
            });
        }

        // Update language buttons
        function updateLangButtons() {
            const langButtons = document.querySelectorAll('.lang-btn');
            langButtons.forEach(btn => {
                if (btn.getAttribute('data-lang') === currentLang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Theme toggle
        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', currentTheme);
            initTheme();
        }

        // Language toggle
        function toggleLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', currentLang);
            initLanguage();
        }

        // Contact Form Handler
        function handleContactForm(event) {
            event.preventDefault();
            const form = event.target;
            const formData = {
                name: form.contactName.value,
                email: form.contactEmail.value,
                description: form.contactDescription.value
            };

            // Create mailto link with form data
            const subject = encodeURIComponent(`Contact from ${formData.name}`);
            const body = encodeURIComponent(`Name: ${formData.name}\nEmail: ${formData.email}\n\nMessage:\n${formData.description}`);
            const mailtoLink = `mailto:samialmuhurse@gmail.com?subject=${subject}&body=${body}`;
            
            // Open email client
            window.location.href = mailtoLink;
            
            // Optional: Show success message
            alert('Opening your email client...');
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            initLanguage();
            
            // Animate elements on load
            const animatedElements = document.querySelectorAll('.fade-in');
            animatedElements.forEach((el, index) => {
                setTimeout(() => {
                    el.classList.add('visible');
                }, index * 100);
            });
        });
    </script>
</body>
</html>
